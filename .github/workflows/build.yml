name: Build and Release

on:
  push:
    branches: [main, dev]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_version:
        description: 'リリースバージョン（例: v0.9.0）。空欄ならdevビルドのみ。'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_release: ${{ steps.version.outputs.is_release }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm run build

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python packages into py_modules
        run: |
          pip install -r requirements.txt -t py_modules --no-cache-dir
          # 不要ファイルを削除
          cd py_modules
          find . -type d -name "tests" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name "test" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find . -name "*.pyc" -delete 2>/dev/null || true
          find . -name "*.pyi" -delete 2>/dev/null || true
          echo "py_modules size: $(du -sh . | cut -f1)"

      - name: Download Decky CLI
        run: |
          mkdir -p cli
          curl -L -o cli/decky "https://github.com/SteamDeckHomebrew/cli/releases/download/0.0.8/decky-linux-x86_64"
          chmod +x cli/decky

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" && "${{ github.ref_name }}" == v* ]]; then
            VERSION="${{ github.ref_name }}"
            IS_RELEASE="true"
          elif [[ -n "${{ inputs.release_version }}" ]]; then
            VERSION="${{ inputs.release_version }}"
            IS_RELEASE="true"
          else
            VERSION="dev-$(echo ${{ github.sha }} | cut -c1-7)"
            IS_RELEASE="false"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_release=$IS_RELEASE" >> $GITHUB_OUTPUT
          echo "Version: $VERSION (is_release: $IS_RELEASE)"

      - name: Update package.json version
        if: steps.version.outputs.is_release == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # v プレフィックスを除去してセマンティックバージョンに
          SEM_VER="${VERSION#v}"
          sed -i -E "s#\"version\": \"[0-9]+\.[0-9]+\.[0-9]+\"#\"version\": \"$SEM_VER\"#g" package.json
          grep "version" package.json | head -1

      - name: Build plugin with Decky CLI
        run: |
          cli/decky plugin build $(pwd) -o ./out
          ls -lh out/

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: decky-translator-plugin
          path: out/*.zip

  release:
    if: needs.build.outputs.is_release == 'true'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: decky-translator-plugin
          path: ./

      - name: Get ZIP download URL
        id: zip_url
        run: |
          REPO="${{ github.repository }}"
          TAG="${{ needs.build.outputs.version }}"
          # スペースを . に置換したファイル名（GitHub Releases の仕様）
          echo "url=https://github.com/${REPO}/releases/download/${TAG}/Translator.LLM.zip" >> $GITHUB_OUTPUT

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          files: "Translator LLM.zip"
          draft: false
          generate_release_notes: true
          body: |
            ## インストール

            1. Deckyメニュー → 設定 → **Developer Mode** を有効化
            2. **Developer** タブ → **Install Plugin from ZIP**
            3. 以下のURLを貼り付け:

            ```
            ${{ steps.zip_url.outputs.url }}
            ```

            4. Decky Loaderを再起動
